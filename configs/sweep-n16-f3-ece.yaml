seed: 42
datapath: dataset
val_split: 0.1
n_constituents: 16
pt_eta_phi: true
model_class: gnn

save_path: trust_models/3-feature/jet_classifier_large_16_ece
model:
  init_bw_a: 7
  init_bw_k: 7
  k_bw_l1_reg: 1.e-8
  a_bw_l1_reg: 1.e-8
train:
  # Warm-start from the official n=16, 3-feature, non-perminv HGQ checkpoint,
  # then continue training with the ECE-aware objective below.
  init_weights: "official_models/3-feature/jet_classifier_large_16/ckpts/epoch=4350-acc=71.90%-val_acc=72.02%-EBOPs=60426.keras"
  lr: 0
  bsz: 2790
  epochs: 100
  cdr_args:
    initial_learning_rate: 3.e-4
    first_decay_steps: 100
    t_mul: 1.0
    m_mul: 1.0
    alpha: 1.e-6
    alpha_steps: 10 # #epoch at lowest lr before next restart. Total cycle = first_decay_steps - alpha_steps
trust:
  enabled: true
  ece_bins: 15
  ece_weight: 5.0
  pareto_min_accuracy: 0.68
beta:
  intervals:
    - - 0
      - 3.e-6
      - constant
    - - ${train.epochs}
      - 3.e-6
      - constant
